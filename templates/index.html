<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<title>Spartapedia</title>

<style>
* { font-family: 'Gowun Dodum', sans-serif; }

.mytitle {
    width: 100%;
    height: 250px;
    background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://movie-phinf.pstatic.net/20210715_95/1626338192428gTnJl_JPEG/movie_image.jpg');
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.mytitle > button {
    width: 200px;
    height: 50px;
    background: transparent;
    color: white;
    border: 1px solid white;
    border-radius: 50px;
}

.mycards {
    width: 95%;
    max-width: 1200px;
    margin: 20px auto;
}

.card-img-top {
    height: 250px;
    object-fit: cover;
}

.mypost {
    width: 95%;
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
    box-shadow: 0px 0px 3px gray;
    display: none;
}
</style>

<script>

$(document).ready(function(){
    listing();
});

function listing(){
    $('#cards-box').empty();

    $.ajax({
        type: 'GET',
        url: '/movie',
        success: function(response){
            let rows = response['movies'];

            for(let i=0;i<rows.length;i++){
                let r = rows[i];
                let star = '⭐'.repeat(r['star']);

                let html = `
                <div class="col">
                    <div class="card h-100">
                        <img src="${r['image']}" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">${r['title']}</h5>
                            <p>${r['description']}</p>
                            <p>${star}</p>
                            <p class="text-muted">${r['comment']}</p>
                        </div>
                    </div>
                </div>`;

                $('#cards-box').append(html);
            }
        }
    });
}

function posting(){

    let url = $('#url').val();
    let star = $('#star').val();
    let comment = $('#comment').val();

    $.ajax({
        type: 'POST',
        url: '/movie',
        data: {
            url_give: url,
            star_give: star,
            comment_give: comment
        },
        success: function(response){
            alert(response['msg']);
            window.location.reload();
        }
    });
}

function open_box(){
    $('#post-box').show();
}

function close_box(){
    $('#post-box').hide();
}

</script>

</head>

<body>

<div class="mytitle">
    <h1>My Favorite Movies</h1>
    <button onclick="open_box()">Save movie</button>
</div>

<div class="mypost" id="post-box">

    <div class="form-floating mb-3">
        <input id="url" class="form-control" placeholder="url">
        <label>Movie URL</label>
    </div>

    <div class="input-group mb-3">
        <label class="input-group-text">Rating</label>
        <select class="form-select" id="star">
            <option value="">-- Select --</option>
            <option value="1">⭐</option>
            <option value="2">⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="5">⭐⭐⭐⭐⭐</option>
        </select>
    </div>

    <div class="form-floating">
        <textarea id="comment" class="form-control"></textarea>
        <label>Comment</label>
    </div>

    <div class="mybtns mt-3">
        <button onclick="posting()" class="btn btn-dark">Save</button>
        <button onclick="close_box()" class="btn btn-outline-dark">Close</button>
    </div>

</div>

<div class="mycards">
    <div class="row row-cols-1 row-cols-md-4 g-4" id="cards-box"></div>
</div>

</body>
</html>
